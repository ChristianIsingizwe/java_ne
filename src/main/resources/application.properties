spring.application.name=utility-billing-system

# DATABASE
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/utility_billing}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET:Yk9wQ2x2N3pHc1J0VWlPcEFzRGZHaEprTHpYY1ZiTm1Rd0VyVHk=}
app.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:86400000}

# Seed admin
app.admin.email=${ADMIN_EMAIL:admin@utility.local}
app.admin.password=${ADMIN_PASSWORD:admin12345}
app.admin.full-name=${ADMIN_FULL_NAME:System Administrator}
app.admin.phone=${ADMIN_PHONE:+250788000001}

# Resend email delivery
app.notifications.email.enabled=${NOTIFICATIONS_EMAIL_ENABLED:true}
app.notifications.email.api-key=${RESEND_API_KEY:re_BvEGEibw_DBkAc4Ta8UzYLGZ1RJ3q2JLE}
app.notifications.email.from=${RESEND_FROM_EMAIL:christian@getconvy.pro}

# OPENAPI / SWAGGER
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
